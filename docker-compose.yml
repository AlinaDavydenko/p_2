version: "3.9"

services:
  # --- Infrastructure -------------------------------------------------

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: rabbitmq
    ports:
      - "5672:5672"   # AMQP
      - "15672:15672" # Management UI (guest/guest)
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- Auth Service -----------------------------------------------------

  auth_service:
    build: ./auth_service
    container_name: auth_service
    env_file:
      - ./auth_service/.env
    ports:
      - "8000:8000"
    volumes:
      - auth_data:/app

  # --- Bot Service: web (health), Telegram polling, Celery worker -------

  bot_service:
    build: ./bot_service
    container_name: bot_service_web
    env_file:
      - ./bot_service/.env
    environment:
      REDIS_URL: redis://redis:6379/0
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672//
    ports:
      - "8001:8001"
    depends_on:
      - redis
      - rabbitmq

  bot_polling:
    build: ./bot_service
    container_name: bot_service_polling
    command: ["python", "-m", "app.bot.entrypoint"]
    env_file:
      - ./bot_service/.env
    environment:
      REDIS_URL: redis://redis:6379/0
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672//
    depends_on:
      - redis
      - rabbitmq

  celery_worker:
    build: ./bot_service
    container_name: bot_service_worker
    command: ["celery", "-A", "app.infra.celery_app.celery_app", "worker", "--loglevel=info"]
    env_file:
      - ./bot_service/.env
    environment:
      REDIS_URL: redis://redis:6379/0
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672//
    depends_on:
      - redis
      - rabbitmq

volumes:
  auth_data:
